spec:
  containers:
    - name: mendix-app
      image: /your_db/public/poc_repo/mendix-app:poc
      env:
        RUNTIME_PARAMS_DATABASE_TYPE: PostgreSQL
        RUNTIME_PARAMS_DATABASE_HOST: "localhost:5432"
        RUNTIME_PARAMS_DATABASE_NAME: mendix
        MXRUNTIME_com_mendix_storage_PerformDeleteFromStorage: "true"
        MXRUNTIME_com_mendix_core_StorageService: com.mendix.storage.localfilesystem
        MXRUNTIME_com_mendix_storage_localfilesystem_Location: /mnt/filestorage
      readinessProbe:
        port: 8080
        path: /health/ready
      volumeMounts:
        - name: filestorage
          mountPath: /mnt/filestorage
      resources:
        requests:
          memory: 2G
          cpu: 1
        limits:
          memory: 4G
          cpu: 2
      secrets:
        - snowflakeSecret:
            objectName: mendix_db_credentials
            secretKeyRef: username
          envVarName: RUNTIME_PARAMS_DATABASE_USERNAME
        - snowflakeSecret:
            objectName: mendix_db_credentials
            secretKeyRef: password
          envVarName: RUNTIME_PARAMS_DATABASE_PASSWORD
        - snowflakeSecret:
            objectName: mendix_admin_password
            secretKeyRef: secret_string
          envVarName: M2EE_ADMIN_PASS
    - name: postgres
      image: /your_db/public/poc_repo/postgres:16
      env:
        POSTGRES_DB: mendix
        POSTGRES_USER: mendix
        POSTGRES_PASSWORD: mendix_poc_password
      volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      resources:
        requests:
          memory: 512M
          cpu: 0.5
        limits:
          memory: 1G
          cpu: 1
  endpoints:
    - name: mendix-web
      port: 8080
      public: true
  volumes:
    - name: filestorage
      source: stage
      stageConfig:
        name: mendix_filestorage_stage
    - name: pgdata
      source: local
  logExporters:
    eventTableConfig:
      logLevel: INFO
