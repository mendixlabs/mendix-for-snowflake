<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Signing in...</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
    </style>
</head>
<body>
    <p>Signing you in...</p>
    <script>
        (function() {
            // Preserve the user's original destination (deep link, page URL, hash)
            var returnTo = window.location.search + window.location.hash;
            var cont = returnTo ? encodeURIComponent(returnTo) : '';
            var ssoUrl = '/headersso/' + (cont ? '?cont=' + cont : '');
            window.location.replace(ssoUrl);
        })();
    </script>
    <noscript>
        <p>JavaScript is required. Please enable JavaScript and reload.</p>
    </noscript>
</body>
</html>
