# CodeQL static analysis for the Python services (Controller, Admin UI).
# Complements security-scan.yml's Bandit job with GitHub's semantic SAST engine;
# findings land in the repository Security tab.

name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, 30 minutes after security-scan's Monday 06:00 UTC run.
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: codeql (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
